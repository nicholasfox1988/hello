<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒计时计时器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .date {
      font-size: 30px;
      color: #333;
      margin-bottom: 30px;
      font-weight: 500;
      letter-spacing: 1px;
      color: green;
    }

    .time-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .time-display span {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      min-width: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .time-display i {
      font-size: 40px;
      color: #764ba2;
      font-style: normal;
    }

    .over {
      font-size: 20px;
      color: #764ba2;
      font-weight: 600;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 30px 20px;
      }

      .time-display span {
        font-size: 32px;
        min-width: 60px;
      }

      .time-display i {
        font-size: 28px;
      }

      .date,
      .over {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <p class="date">现在时间是：</p>
    <div class="time-display">
      <span class="hour">00</span>
      <i>:</i>
      <span class="minute">00</span>
      <i>:</i>
      <span class="second">00</span>
    </div>
    <p class="over"></p>
  </div>
  <script>
    let date, time1, time2, time3, hours, minutes, seconds;
    let p1 = document.querySelector('.date');
    let p2 = document.querySelector('.over');
    let hour = document.querySelector('.hour');
    let minute = document.querySelector('.minute');
    let second = document.querySelector('.second');
    let str2 = prompt('请输入下课时间:') + ':00';
    let str1 = `${new Date().toLocaleDateString()} ${str2}`;
    p2.innerHTML = `下课时间是：${str2}`;

    let n = setInterval(() => {
      console.log('hello')
      date = new Date();
      p1.innerHTML = `现在时间是： ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
      time1 = +new Date()
      time2 = +new Date(str1)
      time3 = time2 - time1
      hours = Math.floor(time3 / 1000 / 60 / 60);
      minutes = Math.floor(time3 / 1000 / 60) % 60;
      seconds = Math.floor(time3 / 1000) % 60;
      hour.innerHTML = hours < 10 ? '0' + hours : hours;
      minute.innerHTML = minutes < 10 ? '0' + minutes : minutes;
      second.innerHTML = seconds < 10 ? '0' + seconds : seconds;
      if (time3 <= 0) {
        clearInterval(n);
        hour.innerHTML = '00';
        minute.innerHTML = '00';
        second.innerHTML = '00';
        clearInterval(n);
      }
    }, 1000);
  </script>
</body>

</html>
