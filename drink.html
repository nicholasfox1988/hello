<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饮品清单</title>
  <style>
    :root {
      --bg: #f2f8ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #2563eb;
      --danger: #ef4444;
      --border: #dbeafe;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #dbeafe 0%, transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .div2 {
      width: auto;
      max-width: min(100%, 860px);
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      margin: 0 auto;
      display: inline-block;
    }

    h1 {
      display: inline;
      margin: 0 0 18px;
      font-size: clamp(1.9rem, 2.5vw, 2.4rem);
      letter-spacing: -0.03em;
    }

    p.subtitle {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.6;
    }

    table {
      width: auto;
      border-collapse: collapse;
      background: transparent;
      margin: 0 auto;
    }

    thead th,
    td {
      padding: 10px 12px;
    }

    thead th {
      text-align: left;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-bottom: 3px solid rgba(255, 255, 255, 0.18);
    }

    tbody tr {
      transition: background 0.2s ease, transform 0.2s ease;
    }

    tbody tr:hover {
      background: #f5f9ff;
      transform: translateX(1px);
    }

    .show-all-btn {
      margin-bottom: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .show-all-btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .hidden-row {
      display: none;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      color: var(--text);
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: #fbfdff;
    }

    td:first-child {
      width: auto;
    }

    td:nth-child(2) {
      font-weight: 600;
      color: #0f172a;
    }

    td:nth-child(3) select,
    td:nth-child(1) input[type="checkbox"] {
      min-width: auto;
      width: auto;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #f8fbff;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .delete-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border: none;
      border-radius: 999px;
      background: #ef4444;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.14);
    }

    .delete-btn:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      .div2 {
        padding: 20px;
      }

      thead th,
      td {
        padding: 14px 12px;
      }

      td:first-child {
        width: 60px;
      }
    }
  </style>
</head>

<body>
  <div class="div2">
    <h1>饮品清单</h1>
    <button id="showAllBtn" class="show-all-btn">全部显示</button>
    <table>
      <thead>
        <tr>
          <th>off</th>
          <th>drink</th>
          <th>Qu...</th>
        </tr>
      </thead>
      <tbody>

      </tbody>
    </table>

  </div>
  <script>
    const tableBody = document.querySelector('tbody');
    // let arr1 = [{ 'name': 'coca-cola', 'quantity': 1 }, { 'name': 'fanta', 'quantity': 1 }, { 'name': 'sprite', 'quantity': 1 }];
    let arr1 = ['coca-cola', 'fanta', 'sprite'];

    function render() {
      tableBody.innerHTML = ''; // 清空表格内容
      arr1.forEach(item => {
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
          <td><input type="checkbox"></td>
          <td>${item}</td>
          <td>
            <select>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </td>
        `;
        const checkbox = newRow.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', () => {
          if (checkbox.checked) {
            newRow.classList.add('hidden-row');
          }
        });
        tableBody.appendChild(newRow);
      });
    }

    const showAllBtn = document.getElementById('showAllBtn');
    showAllBtn.addEventListener('click', () => {
      const rows = tableBody.querySelectorAll('tr');
      rows.forEach(row => {
        const checkbox = row.querySelector('input[type="checkbox"]');
        if (checkbox) {
          checkbox.checked = false;
          row.classList.remove('hidden-row');
        }
      });
    });

    render();
  </script>

</html>
