<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    :root {
      --bg: #f2f7ff;
      --panel: rgba(255, 255, 255, 0.95);
      --border: rgba(100, 116, 139, 0.18);
      --accent: #5c6ef8;
      --accent-soft: #dfe4ff;
      --text: #1f2937;
      --muted: #64748b;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #ffe4ec 0%, #ffd1e0 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px 12px;
    }

    .page {
      width: min(100%, 680px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-top: 0;
    }

    .todo-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 8px 0 18px;
    }

    .todo-form input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .todo-form input:focus {
      outline: none;
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 0 0 4px rgba(92, 110, 248, 0.1);
    }

    .todo-form button {
      padding: 14px 20px;
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .todo-form button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .todo-form button:active {
      transform: translateY(0);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #d1fae5;
      border: 1px solid rgba(34, 197, 94, 0.25);
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.08);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    li:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 197, 94, 0.35);
    }

    li.done {
      background: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.35);
    }

    li.done span {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    .item-left input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .item-left span {
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.5;
    }

    .remove-btn {
      background: transparent;
      color: white;
      border: none;
      border-radius: 50%;
      padding: 10px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .remove-btn:hover {
      background: rgba(239, 68, 68, 0.12);
      transform: translateY(-1px);
    }

    .remove-btn img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: block;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 24px 16px;
      border: 1px dashed rgba(100, 116, 139, 0.3);
      border-radius: 18px;
      background: rgba(223, 228, 255, 0.35);
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="page">
    <form class="todo-form" id="todo-form">
      <input type="text" id="todo-input" placeholder="随便写吧！" autocomplete="off" />
      <!-- <button type="submit">添加</button> -->
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script>
    const STORAGE_KEY = 'todoListItems';
    const todoForm = document.getElementById('todo-form');
    const todoInput = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');

    function getSavedTodos() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function renderTodos() {
      const todos = getSavedTodos();
      todoList.innerHTML = '';

      if (todos.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'empty-state';
        emptyItem.textContent = '暂时没有待办事项！';
        todoList.appendChild(emptyItem);
        return;
      }

      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = todo.done ? 'done' : '';

        const itemLeft = document.createElement('div');
        itemLeft.className = 'item-left';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => {
          todos[index].done = checkbox.checked;
          saveTodos(todos);
          renderTodos();
        });

        const label = document.createElement('span');
        label.textContent = todo.text;

        itemLeft.appendChild(checkbox);
        itemLeft.appendChild(label);

        const removeButton = document.createElement('button');
        removeButton.className = 'remove-btn';
        removeButton.setAttribute('aria-label', '删除待办事项');
        const removeIcon = document.createElement('img');
        removeIcon.src = 'img/del.jpeg';
        removeIcon.alt = '删除';
        removeButton.appendChild(removeIcon);
        removeButton.addEventListener('click', () => {
          if (window.confirm('确定要删除这个待办事项吗？')) {
            todos.splice(index, 1);
            saveTodos(todos);
            renderTodos();
          }
        });

        li.appendChild(itemLeft);
        li.appendChild(removeButton);
        todoList.insertBefore(li, todoList.firstChild);
      });
    }

    todoForm.addEventListener('submit', event => {
      event.preventDefault();
      const text = todoInput.value.trim();
      if (!text) return;

      const todos = getSavedTodos();
      todos.push({ text, done: false });
      saveTodos(todos);
      todoInput.value = '';
      renderTodos();
    });

    document.addEventListener('DOMContentLoaded', renderTodos);
  </script>
</body>

</html>
