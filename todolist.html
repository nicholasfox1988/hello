<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>newtodolist</title>
  <script src="js/jquery-4.0.0.min.js"></script>

  <style>
    * {
      margin: 5px;
    }

    body {
      text-align: center;
    }

    div {
      margin: 15px;
    }

    .top {
      height: 50px;
    }

    .now {
      background-color: pink;
    }

    .pass {
      background-color: green;
    }

    div {
      border: solid;
      border-radius: 8px;
      border-color: green;
    }

    li input,
    li p,
    li a {
      display: inline-block;
      vertical-align: middle;
      /* 垂直居中 */
    }

    li p {
      margin: 5px;
      display: inline;
      /* 或者使用 inline，通常 p 是 block，这里需要强制转换 */
    }

    li {
      display: flex;
      justify-content: space-between;
      list-style: none;
      text-align: left
    }
  </style>
</head>

<body>
  <div class="top">
    <label for="">To-Do-List:</label>
    <input class="input" type="text" name="" id="" placeholder="请输入">
  </div>
  <div class="now">
    <p>正在处理的待办</p>
    <ol>

    </ol>
  </div>
  <div class="pass">
    <p>已经处理的待办</p>
    <ul>

    </ul>
  </div>

  <script>
    let data = localStorage.getItem('todolist-data') ? JSON.parse(localStorage.getItem('todolist-data')) : []
    $(function () {
      render()
      // console.log(data)
      $('.input').on('keyup', function (e) {
        if (e.key === 'Enter') {
          if (!$(this).val()) {
            alert('输入不能为空!')
          } else {
            data.push({ content: $(this).val(), done: false })
            localStorage.setItem('todolist-data', JSON.stringify(data))
            $(this).val('')
            render()
          }
        }
      })

      $('ol,ul').on('click', 'a', function () {
        data.splice($(this).attr('id'), 1)
        localStorage.setItem('todolist-data', JSON.stringify(data))
        render()
      })

      $('ol,ul').on('click', 'input', function () {
        data[$(this).siblings('a').attr('id')].done = $(this).prop('checked')
        localStorage.setItem('todolist-data', JSON.stringify(data))
        render()
      })

      function render() {
        $('ol').empty()
        $('ul').empty()
        $.each(data, function (index, item) {
          if (item.done) {
            $('ul').prepend(`<li><input type='checkbox' checked='checked'><p>${item.content}</p><a href='javascript:;' id=${index}>delete</a></li>`)
          } else {
            $('ol').prepend(`<li><input type='checkbox'><p>${item.content}</p><a href='javascript:;' id=${index}>delete</a></li>`)
          }
        })
      }
    })
  </script>
</body>

</html>
