<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩国海/空运数据</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="./js/vue.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        #searchInput {
            padding: 8px;
            /* flex-grow: 1; */
            width: 100px;
            font-size: 16px;
        }

        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        tr.row-checked td {
            color: #777;
            opacity: 0.6;
            text-decoration: line-through;
        }

        .file-input {
            margin-bottom: 20px;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        #showing {
            padding: 20px;
            width: 60%;
            border: solid;
            border-color: green;
            border-radius: 30px;
            margin: auto;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="showing">
            <p v-html="htmlContent">这里显示数据</p>
            <br>
            <!-- 输入px查询 -->
            <input type="text" placeholder="3个数字" autocomplete="off" @keyup.enter="search" v-model="inputValue">
            <!-- <button onclick="speakResult()">重复发音</button> -->
            <p v-html="total"></p>
        </div>
        <div>
            <input type="file" id="fileInput" accept=".xlsx, .xls" @change="loadData($event)">
        </div>
        <div id="tableContainer">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>px</th>
                        <th>
                            <button class="diaomao">点击</button>
                        </th>
                        <th>Delivery</th>
                        <th>Q...</th>
                        <th>NAME</th>
                        <th>No</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr v-for="(row,index) in excelData" :key="row.px">
                        <td>{{ row.px }}</td>
                        <td><input type="checkbox"></td>
                        <td>{{ row.delivery }}</td>
                        <td>{{ row.ctns }}</td>
                        <td>{{ row.consignee }}</td>
                        <td>{{ row.no }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const app = new Vue({
            el: '#app',
            data: {
                htmlContent: "查询结果",
                inputValue: "",
                excelData: [],
                searchData: [],
                currentResult: '',
                total: {}
            },
            methods: {
                loadData(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });

                        // Get the last sheet
                        const lastSheetName = workbook.SheetNames[workbook.SheetNames.length - 1];
                        const worksheet = workbook.Sheets[lastSheetName];

                        // Convert to JSON
                        const jsonData1 = XLSX.utils.sheet_to_json(worksheet);
                        const jsonData2 = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        const headers = jsonData2[0];
                        // console.log(headers);                
                        // console.log(jsonData1);
                        // Process the data
                        excelData = jsonData1.map(row => {
                            const no = row[headers[1]];
                            const px = no.toString().slice(-3);
                            return {
                                px: px,
                                delivery: row[headers[7]],
                                ctns: row[headers[2]],
                                consignee: row[headers[0]],
                                // pay:row[headers[6]],
                                no: no,
                                date: row[headers[8]]
                            };
                        }).filter(row => row.no);

                        excelData.map(row => {
                            if (!row.delivery || !row.date) row.delivery = "不处理";
                        });

                        excelData.sort((a, b) => {
                            const nameA = a['delivery'].toUpperCase(); // 忽略大小写
                            const nameB = b['delivery'].toUpperCase();
                            if (nameA < nameB) {
                                return -1;
                            }
                            if (nameA > nameB) {
                                return 1;
                            }
                            return 0;
                        });

                        let orderSummary = excelData.reduce((acc, row) => {
                            const { delivery, ctns } = row;
                            if (!acc[delivery]) acc[delivery] = 0;
                            acc[delivery] += ctns;
                            return acc;
                        }, {});
                        console.log(excelData);
                        app.excelData = excelData;
                        app.total = orderSummary;
                    };
                    reader.readAsArrayBuffer(file);
                },
                search() {
                    app.searchData = app.excelData.find(item => item.px === app.inputValue)
                    app.htmlContent = `${app.searchData.delivery}<br>${app.searchData.px}<br>${app.searchData.consignee}  ${app.searchData.ctns}`
                    app.inputValue = ''
                }
            }
        });

    </script>
</body>

</html>
