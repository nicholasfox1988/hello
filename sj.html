<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    table {
      margin: 30px;
      padding: 30px;
      border-collapse: collapse;
      border: 3px solid #13df50;
      border-radius: 8px;
      text-align: center;
    }

    th {
      background-color: rgb(60, 95, 211);
    }

    th,
    td {
      border: 1px solid #000;
      padding: 10px;
      width: 100px;
    }

    input {
      width: 30%;
    }

    .red {
      background-color: pink;
    }

    .btn {
      width: 30px;
      margin: 5px;
    }

    select {
      width: 100px;
      height: 30px;
    }
  </style>
</head>

<body>
  <div id="app">
    <table>
      <thead>
        <tr>
          <th>星期</th>
          <th>时间</th>
          <th>数值</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="item in week" :key=week.id :class="{red:item.value>0}">
          <td>{{item.name}}</td>
          <td>
            <select v-model="item.value">
              <option value="0">休</option>
              <option value="10">11-9</option>
              <option value="5">11-4</option>
              <option value="6">11-5</option>
              <option value="7">11-6</option>
              <option value="11.5">9:30-9</option>
              <option value="6.5">9:30-4</option>
            </select>
          </td>
          <td>{{item.value}}</td>
        </tr>
        <tr>
          <td><button @click="extra=0">clear</button></td>
          <td>
            <button @click="sub" class="btn"> - </button>
            <button @click="add" class="btn"> + </button>

          </td>
          <td>{{ extra }}</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="2">
            <input type="text" v-model="per">
            合计: {{ per*total}}
          </td>
          <td>{{total}}</td>
      </tfoot>
    </table>
  </div>

  <script src="js/vue.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        per: 0,
        extra: 0,
        week: [
          { id: 1, name: '一', value: 0 },
          { id: 2, name: '二', value: 0 },
          { id: 3, name: '三', value: 0 },
          { id: 4, name: '四', value: 0 },
          { id: 5, name: '五', value: 0 },
          { id: 6, name: '六', value: 0 },
          { id: 7, name: '日', value: 0 },
        ]
      },
      computed: {
        total() {
          return this.week.reduce((a, b) => a + Number(b.value), this.extra)
        }
      },
      methods: {
        add() {
          return this.extra += 0.5
        },
        sub() {
          return this.extra -= 0.5
        }
      }
    })

  </script>
</body>

</html>
